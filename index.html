<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Universal AI Studio</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <style>
        :root { --bg: #1e1e1e; --sidebar: #252526; --accent: #007acc; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid #333; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        #workspace { flex: 1; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        
        #container { display: flex; flex: 1; }
        #editor { flex: 1; border-right: 1px solid #333; }
        #preview { flex: 1; background: white; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        .panel { padding: 15px; border-bottom: 1px solid #333; }
        input { width: 88%; background: #3c3c3c; border: 1px solid #555; color: white; padding: 12px; border-radius: 5px; margin-bottom: 10px; font-size: 16px; outline: none; }
        .btn { width: 100%; background: var(--accent); border: none; color: white; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        #monitor { height: 100px; background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; overflow-y: auto; margin-top: 10px; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="panel">
        <b style="font-size:11px; color:#888;">UNIVERSAL AGENT</b>
        <input type="text" id="agent-prompt" placeholder="Describe ANY game or feature...">
        <button class="btn" onclick="executeAgent()">BUILD EVERYTHING</button>
        <div id="monitor"></div>
    </div>
    <div class="panel">
        <button class="btn" style="background:#28a745;" onclick="createLink()">SHARE GAME LINK</button>
    </div>
</div>

<div id="workspace">
    <div id="container">
        <div id="editor"></div>
        <div id="preview">
            <iframe id="live-frame" sandbox="allow-scripts allow-modals"></iframe>
        </div>
    </div>
</div>

<script>
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
        window.editor = monaco.editor.create(document.getElementById('editor'), {
            value: `<!DOCTYPE html>\n<html>\n<head>\n  <style>\n    body { font-family: sans-serif; text-align: center; }\n  </style>\n</head>\n<body>\n  <div id="game-container">\n    <h1>Empty Game Canvas</h1>\n    <p>Tell the Agent what to build!</p>\n  </div>\n</body>\n</html>`,
            language: 'html', theme: 'vs-dark', fontSize: 16, automaticLayout: true, minimap: { enabled: false }
        });

        syncPreview();
        window.editor.onDidChangeModelContent(syncPreview);
    });

    function syncPreview() {
        const frame = document.getElementById('live-frame');
        frame.srcdoc = window.editor.getValue();
    }

    function executeAgent() {
        const prompt = document.getElementById('agent-prompt').value;
        const mon = document.getElementById('monitor');
        if (!prompt) return;

        mon.style.display = "block";
        mon.innerHTML = `> Analyzing: ${prompt}<br>> Constructing logic...`;

        setTimeout(() => {
            let currentCode = window.editor.getValue();
            
            // This is the UNIVERSAL logic: 
            // It creates a unique ID and a script block for whatever you asked.
            const uniqueId = "element_" + Math.floor(Math.random() * 1000);
            const agentInjectedCode = `
    <div id="${uniqueId}" style="border: 2px solid #333; padding: 20px; margin: 15px; border-radius: 10px; background: #fff;">
        <h2 style="margin-top:0;">${prompt.toUpperCase()}</h2>
        <div id="display_${uniqueId}" style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">0</div>
        <button id="action_${uniqueId}" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">INTERACT</button>
    </div>
    
    <script>
        (function() {
            const display = document.getElementById('display_${uniqueId}');
            const btn = document.getElementById('action_${uniqueId}');
            let state = 0;
            
            btn.onclick = function() {
                state++;
                display.innerText = state;
                console.log("Agent updated ${prompt}: " + state);
            };
        })();
    <\/script>\n`;

            // Insert into the body
            if (currentCode.includes('</body>')) {
                currentCode = currentCode.replace('</body>', agentInjectedCode + '</body>');
            } else {
                currentCode += agentInjectedCode;
            }

            window.editor.setValue(currentCode);
            mon.innerHTML += "<br>> COMPLETE: Game updated.";
            document.getElementById('agent-prompt').value = "";
        }, 800);
    }

    function createLink() {
        const code = window.editor.getValue();
        const base64 = btoa(unescape(encodeURIComponent(code)));
        const url = "data:text/html;base64," + base64;
        
        const blob = new Blob([url], {type: 'text/plain'});
        const tempInput = document.createElement('input');
        document.body.appendChild(tempInput);
        tempInput.value = url;
        tempInput.select();
        document.execCommand('copy');
        document.body.removeChild(tempInput);
        
        alert("SHARE LINK COPIED TO CLIPBOARD!\n\nPaste it into any browser to play.");
    }
</script>
</body>
</html>
