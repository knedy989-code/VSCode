<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gemini Agent Studio</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <style>
        :root { --bg: #111; --sidebar: #1a1a1a; --accent: #4285f4; --gemini-gradient: linear-gradient(45deg, #4285f4, #9b72cb, #d96570); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 320px; background: var(--sidebar); border-right: 1px solid #333; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        #workspace { flex: 1; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        
        /* Agent UI */
        .agent-header { padding: 20px; background: var(--gemini-gradient); font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .panel { padding: 20px; border-bottom: 1px solid #333; }
        input { width: calc(100% - 24px); background: #252525; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 15px; outline: none; }
        input:focus { border-color: #4285f4; }
        .btn { width: 100%; background: var(--accent); border: none; color: white; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { filter: brightness(1.2); }
        
        /* Layout */
        #container { display: flex; flex: 1; overflow: hidden; }
        #editor { flex: 1; border-right: 1px solid #333; }
        #preview { flex: 1; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        #console { height: 120px; background: #000; color: #8ab4f8; font-family: monospace; font-size: 12px; padding: 12px; overflow-y: auto; border-top: 1px solid #333; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="agent-header">Gemini AI Agent</div>
    <div class="panel">
        <input type="text" id="ai-prompt" placeholder="Try: 'Add a space game engine'">
        <button class="btn" onclick="askGemini()">PROMPT GEMINI</button>
    </div>
    <div class="panel">
        <button class="btn" style="background:#34a853;" onclick="copyGameLink()">GENERATE SHARE LINK</button>
    </div>
    <div id="console">> Agent Standby...</div>
</div>

<div id="workspace">
    <div id="container">
        <div id="editor"></div>
        <div id="preview"><iframe id="live-frame" sandbox="allow-scripts allow-modals"></iframe></div>
    </div>
</div>

<script>
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
        window.editor = monaco.editor.create(document.getElementById('editor'), {
            value: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #fafafa; font-family: sans-serif; }\n</style>\n</head>\n<body>\n\n</body>\n</html>`,
            language: 'html', theme: 'vs-dark', fontSize: 16, automaticLayout: true, minimap: { enabled: false }
        });
        refresh();
        window.editor.onDidChangeModelContent(refresh);
    });

    function refresh() {
        const frame = document.getElementById('live-frame');
        const blob = new Blob([window.editor.getValue()], { type: 'text/html' });
        frame.src = URL.createObjectURL(blob);
    }

    function log(msg) {
        const c = document.getElementById('console');
        c.innerHTML += `<div>> ${msg}</div>`;
        c.scrollTop = c.scrollHeight;
    }

    // THE AGENT BRAIN
    function askGemini() {
        const prompt = document.getElementById('ai-prompt').value.toLowerCase();
        if (!prompt) return;
        
        log(`Analyzing: "${prompt}"`);
        
        setTimeout(() => {
            let snippet = "";
            const id = "gem_" + Math.floor(Math.random() * 1000);

            // INTELLIGENT ROUTING
            if (prompt.includes("game") || prompt.includes("engine") || prompt.includes("player")) {
                snippet = `
  <div id="world_${id}" style="width: 300px; height: 200px; background: #111; position: relative; overflow: hidden; border-radius: 10px; border: 4px solid #333;">
    <div id="player_${id}" style="width: 20px; height: 20px; background: #4285f4; position: absolute; left: 140px; top: 90px; border-radius: 50%;"></div>
    <div style="position: absolute; bottom: 10px; color: white; width: 100%; text-align: center; font-size: 10px;">MOVE WITH BUTTONS</div>
  </div>
  <div style="margin-top: 10px;">
    <button onclick="move${id}(-10, 0)">LEFT</button>
    <button onclick="move${id}(10, 0)">RIGHT</button>
  </div>
  <script>
    function move${id}(dx, dy) {
      const p = document.getElementById('player_${id}');
      p.style.left = (parseInt(p.style.left) + dx) + 'px';
    }
  <\/script>`;
                log("Constructed movement engine.");
            } 
            else if (prompt.includes("form") || prompt.includes("input") || prompt.includes("login")) {
                snippet = `
  <div style="padding: 20px; background: white; border: 1px solid #ddd; border-radius: 12px; width: 250px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    <h3 style="margin-top:0;">Sign In</h3>
    <input type="text" placeholder="Username" style="width:90%; margin-bottom:10px; padding:8px;">
    <button style="width:100%; padding:10px; background:var(--accent); color:white; border:none; border-radius:5px;">Continue</button>
  </div>`;
                log("Generated UI Form module.");
            }
            else {
                snippet = `
  <div style="background: white; padding: 20px; border-radius: 10px; border-left: 5px solid #4285f4; margin: 10px;">
    <strong>Agent Note:</strong> Added component for <em>${prompt}</em>
    <p>Interactivity ready for expansion.</p>
  </div>`;
                log("Module deployed.");
            }

            // CODE INJECTION
            let code = window.editor.getValue();
            code = code.replace('</body>', snippet + '\n</body>');
            window.editor.setValue(code);
            document.getElementById('ai-prompt').value = "";
        }, 600);
    }

    function copyGameLink() {
        const code = window.editor.getValue();
        const base64 = btoa(unescape(encodeURIComponent(code)));
        navigator.clipboard.writeText("data:text/html;base64," + base64).then(() => {
            alert("Share Link Copied! Your game is ready to go.");
        });
    }
</script>
</body>
</html>
