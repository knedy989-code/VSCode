<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Studio Fixed</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <style>
        :root { --bg: #1e1e1e; --sidebar: #252526; --accent: #007acc; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 280px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #333; padding-top: env(safe-area-inset-top); }
        .panel { padding: 15px; border-bottom: 1px solid #333; }
        .label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        /* Input & Buttons */
        input { width: 85%; background: #3c3c3c; border: 1px solid #555; color: white; padding: 10px; border-radius: 5px; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; background: var(--accent); border: none; color: white; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        
        /* Editor & Preview */
        #workspace { flex: 1; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        #container { display: flex; flex: 1; }
        #editor { flex: 1; border-right: 1px solid #333; }
        #preview { flex: 1; background: white; position: relative; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        /* Agent Log */
        #agent-log { font-size: 11px; color: #0f0; background: #000; padding: 8px; border-radius: 4px; height: 80px; overflow-y: auto; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="panel">
        <span class="label">AI Coding Agent</span>
        <input type="text" id="ai-q" placeholder="e.g. 'Add a red square'">
        <button class="btn" onclick="askAgent()">BUILD WITH AI</button>
        <div id="agent-log"></div>
    </div>

    <div class="panel">
        <span class="label">Sharing</span>
        <button class="btn" style="background: #28a745;" onclick="generateLink()">GENERATE GAME LINK</button>
        <input type="text" id="share-url" style="display:none; font-size: 10px;" readonly>
    </div>
</div>

<div id="workspace">
    <div id="container">
        <div id="editor"></div>
        <div id="preview">
            <iframe id="live-frame"></iframe>
        </div>
    </div>
</div>

<script>
    // 1. Setup Editor
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
        window.editor = monaco.editor.create(document.getElementById('editor'), {
            value: "<!DOCTYPE html>\n<html>\n<head>\n  <style>\n    body { font-family: sans-serif; text-align: center; }\n  </style>\n</head>\n<body>\n  <h1>Game Preview</h1>\n  <p>The agent will add code here.</p>\n</body>\n</html>",
            language: 'html',
            theme: 'vs-dark',
            fontSize: 16,
            automaticLayout: true,
            minimap: { enabled: false }
        });

        // Forced initial update
        setTimeout(updatePreview, 500);
        
        // Listen for changes
        window.editor.onDidChangeModelContent(() => {
            updatePreview();
        });
    });

    // 2. FIXED PREVIEW LOGIC (Doesn't show as text)
    function updatePreview() {
        const frame = document.getElementById('live-frame');
        const code = window.editor.getValue();
        
        const doc = frame.contentDocument || frame.contentWindow.document;
        doc.open();
        // This line tells the browser: "Treat this as a website, not text"
        doc.write(code);
        doc.close();
    }

    // 3. FIXED AGENT LOGIC (Actually injects code)
    function askAgent() {
        const query = document.getElementById('ai-q').value;
        const log = document.getElementById('agent-log');
        if (!query) return;

        log.style.display = "block";
        log.innerHTML += `<div>> Processing: ${query}...</div>`;

        setTimeout(() => {
            let currentCode = window.editor.getValue();
            
            // Create a styled element based on the user request
            const aiCode = `\n  <!-- AI ADDED: ${query} -->\n  <div style="background: #eee; padding: 15px; border-radius: 8px; margin: 10px; border: 2px dashed #007acc;">\n    <strong>Agent Action:</strong> ${query}\n  </div>\n`;

            // Look for the end of the body to insert code correctly
            if (currentCode.includes('</body>')) {
                currentCode = currentCode.replace('</body>', aiCode + '</body>');
            } else {
                currentCode += aiCode;
            }

            window.editor.setValue(currentCode);
            log.innerHTML += `<div>> Success: Code injected into body.</div>`;
            document.getElementById('ai-q').value = "";
            log.scrollTop = log.scrollHeight;
        }, 1000);
    }

    // 4. SHARING LOGIC
    function generateLink() {
        const code = window.editor.getValue();
        const base64 = btoa(unescape(encodeURIComponent(code)));
        const finalUrl = "data:text/html;base64," + base64;
        
        const input = document.getElementById('share-url');
        input.value = finalUrl;
        input.style.display = "block";
        input.select();
        alert("Link Generated! Copy the URL from the box to share.");
    }
</script>
</body>
</html>
