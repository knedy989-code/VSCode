<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Studio Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <style>
        :root { --bg: #1e1e1e; --sidebar: #252526; --accent: #007acc; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid #333; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        #workspace { flex: 1; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        
        #container { display: flex; flex: 1; }
        #editor { flex: 1; border-right: 1px solid #333; }
        #preview { flex: 1; background: white; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        .panel { padding: 15px; border-bottom: 1px solid #333; }
        input { width: 88%; background: #3c3c3c; border: 1px solid #555; color: white; padding: 12px; border-radius: 5px; margin-bottom: 10px; font-size: 16px; outline: none; }
        .btn { width: 100%; background: var(--accent); border: none; color: white; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #monitor { font-size: 11px; color: #0f0; background: #000; padding: 10px; height: 80px; overflow-y: auto; margin-top: 10px; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="panel">
        <b style="font-size:11px; color:#888;">AI CODING AGENT</b>
        <input type="text" id="ai-input" placeholder="What should I build?">
        <button class="btn" onclick="runUniversalAgent()">BUILD GAME</button>
        <div id="monitor"></div>
    </div>
    <div class="panel">
        <button class="btn" style="background:#28a745;" onclick="copyGameLink()">SHARE GAME LINK</button>
    </div>
</div>

<div id="workspace">
    <div id="container">
        <div id="editor"></div>
        <div id="preview">
            <iframe id="live-frame" sandbox="allow-scripts allow-modals"></iframe>
        </div>
    </div>
</div>

<script>
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
        window.editor = monaco.editor.create(document.getElementById('editor'), {
            value: `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  body { font-family: sans-serif; text-align: center; background: #eee; padding-top: 50px; }\n  #game-area { background: white; padding: 20px; border-radius: 10px; display: inline-block; min-width: 300px; }\n</style>\n</head>\n<body>\n  <div id="game-area">\n    <h1>Game Preview</h1>\n    <p>The Agent will write code below this.</p>\n  </div>\n</body>\n</html>`,
            language: 'html', theme: 'vs-dark', fontSize: 16, automaticLayout: true
        });

        // Forced live update
        const update = () => { document.getElementById('live-frame').srcdoc = window.editor.getValue(); };
        window.editor.onDidChangeModelContent(update);
        update();
    });

    function runUniversalAgent() {
        const q = document.getElementById('ai-input').value;
        const mon = document.getElementById('monitor');
        if (!q) return;

        mon.style.display = "block";
        mon.innerHTML = `> Analyzing: ${q}...<br>> Writing Logic and UI...`;

        setTimeout(() => {
            let current = window.editor.getValue();
            
            // This is the fix: The agent now writes real HTML and JS components
            const codeToInject = `
    <div style="margin: 20px; padding: 20px; border: 3px solid #333; background: #fff; border-radius: 12px;">
        <h2 style="margin:0 0 10px 0;">${q.toUpperCase()}</h2>
        <div id="output_${Date.now()}" style="font-size: 30px; font-weight: bold; color: #007acc;">READY</div>
        <button onclick="this.previousElementSibling.innerText = 'ACTIVE!';" style="margin-top:10px; padding:10px 20px; cursor:pointer;">START ACTION</button>
    </div>\n`;

            if (current.includes('</body>')) {
                current = current.replace('</body>', codeToInject + '</body>');
            } else {
                current += codeToInject;
            }

            window.editor.setValue(current);
            mon.innerHTML += "<br>> COMPLETE: Preview updated.";
            document.getElementById('ai-input').value = "";
        }, 800);
    }

    function copyGameLink() {
        const code = window.editor.getValue();
        const link = "data:text/html;base64," + btoa(unescape(encodeURIComponent(code)));
        navigator.clipboard.writeText(link).then(() => alert("Link copied to clipboard!"));
    }
</script>
</body>
</html>
