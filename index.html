<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Studio Share</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <style>
        :root { --bg: #1e1e1e; --sidebar: #252526; --accent: #007acc; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 280px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #333; padding-top: env(safe-area-inset-top); }
        #workspace { flex: 1; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        
        #container { display: flex; flex: 1; }
        #editor { flex: 1; border-right: 1px solid #333; }
        #preview { flex: 1; background: white; }
        iframe { width: 100%; height: 100%; border: none; }

        .panel { padding: 15px; border-bottom: 1px solid #333; }
        .label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        input { width: 90%; background: #3c3c3c; border: none; color: white; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .btn { width: 100%; background: var(--accent); border: none; color: white; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .share-area { background: #111; padding: 10px; border-radius: 5px; font-size: 10px; word-break: break-all; display: none; max-height: 100px; overflow-y: auto; color: #0f0; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="panel">
        <span class="label">AI Agent</span>
        <input type="text" id="ai-q" placeholder="Describe a feature...">
        <button class="btn" onclick="askAgent()">Build with AI</button>
    </div>

    <div class="panel">
        <span class="label">Share & Publish</span>
        <button class="btn" style="background: #28a745;" onclick="generateShareLink()">Generate Game Link</button>
        <div id="share-output" class="share-area"></div>
        <button id="copy-btn" class="btn" style="display:none; background:#555;" onclick="copyLink()">Copy to Clipboard</button>
    </div>
</div>

<div id="workspace">
    <div id="container">
        <div id="editor"></div>
        <div id="preview"><iframe id="live-frame"></iframe></div>
    </div>
</div>

<script>
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
        window.editor = monaco.editor.create(document.getElementById('editor'), {
            value: "<!DOCTYPE html>\n<html>\n<body>\n <h1>My New Game</h1>\n <p>Use the Agent to help you build!</p>\n</body>\n</html>",
            language: 'html', theme: 'vs-dark', fontSize: 16, automaticLayout: true
        });
        update();
        window.editor.onDidChangeModelContent(update);
    });

    function update() {
        const frame = document.getElementById('live-frame');
        const code = window.editor.getValue();
        const blob = new Blob([code], { type: 'text/html' });
        if (window.previewUrl) URL.revokeObjectURL(window.previewUrl);
        window.previewUrl = URL.createObjectURL(blob);
        frame.src = window.previewUrl;
    }

    // AI Agent Logic
    function askAgent() {
        const q = document.getElementById('ai-q').value;
        if (!q) return;
        
        let currentCode = window.editor.getValue();
        // Generates a simple component based on request
        const component = `\n  <div class="ai-build" style="padding:20px; margin:10px; border:2px solid ${['red','blue','green'][Math.floor(Math.random()*3)]}; border-radius:10px;">\n    <h3>AI: ${q}</h3>\n    <p>This was built by your iPad Agent.</p>\n  </div>\n`;
        
        if (currentCode.includes('</body>')) {
            currentCode = currentCode.replace('</body>', component + '</body>');
        } else {
            currentCode += component;
        }

        window.editor.setValue(currentCode);
        document.getElementById('ai-q').value = "";
    }

    // Share Logic
    function generateShareLink() {
        const code = window.editor.getValue();
        // Convert code to Base64 to create a "Data URL"
        const base64Code = btoa(unescape(encodeURIComponent(code)));
        const shareLink = `data:text/html;base64,${base64Code}`;
        
        const output = document.getElementById('share-output');
        output.innerText = shareLink;
        output.style.display = 'block';
        document.getElementById('copy-btn').style.display = 'block';
    }

    function copyLink() {
        const text = document.getElementById('share-output').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Link copied! You can now paste this into a browser to play your game.");
        });
    }
</script>
</body>
</html>
